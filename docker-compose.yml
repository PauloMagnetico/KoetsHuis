name: koetshuis

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    environment:
      - VITE_PROXY_TARGET=http://server:3000
    volumes:
      - koetshuis_web_modules:/usr/src/app/node_modules
      - .:/usr/src/app
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DB_PATH=/data/expenses.db
      - CHOKIDAR_USEPOLLING=1
    volumes:
      - ./server:/usr/src/app
      - koetshuis_data:/data

volumes:
  koetshuis_web_modules:
  koetshuis_data:
