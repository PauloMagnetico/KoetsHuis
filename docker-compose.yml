services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://server:3000
    volumes:
      - /usr/src/app/node_modules
      - .:/usr/src/app
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DB_URL=mongodb://mongodb:27017/koetshuis
    depends_on:
      - mongodb
    volumes:
      - /usr/src/app/node_modules
      - ./server:/usr/src/app
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
volumes:
  mongodb_data:
